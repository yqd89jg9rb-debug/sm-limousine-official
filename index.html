<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM LIMOUSINE | Premium Black Car & Chauffeur Service</title>
    <meta name="description" content="SM LIMOUSINE — Premium black car and chauffeur service. Escalade, Suburban, Sprinter & Motor Coach. Airport transfers, corporate travel, special events.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBJjQX0AwWeSZ7FHHwKBGueEwC6VYd9v60&libraries=places"></script>
</head>
<body>
    <header class="header">
        <div class="header__inner">
            <a href="/" class="header__logo-centered">
                <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" alt="SM LIMOUSINE">
            </a>
            <div class="header__actions">
                <a href="tel:+18177234592" class="header__phone">+1817-723-4592</a>
                <button class="header__burger" id="burgerBtn">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <section class="hero" id="hero">
        <div class="hero__bg"><div class="hero__overlay"></div></div>
        <div class="hero__content">
            <div class="hero__logo-wrap">
                <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" alt="SM LIMOUSINE" class="hero__logo-img">
            </div>
            <h2 class="hero__tagline">Experience the Pinnacle of Luxury Travel</h2>
            <p class="hero__subtitle">Elite chauffeur service for your every journey</p>

            <div class="booking-widget">
                <div class="booking-widget__tabs">
                    <button class="booking-widget__tab active" data-tab="oneway">One Way</button>
                    <button class="booking-widget__tab" data-tab="roundtrip">Round Trip</button>
                    <button class="booking-widget__tab" data-tab="hourly">Hourly</button>
                </div>

                <form class="booking-widget__form active" id="form-oneway">
                    <div class="booking-widget__field"><label class="field-label">Pickup</label><input type="text" id="pickup-oneway" placeholder="Enter Pickup Location" required class="st-input address-input"></div>
                    <div class="booking-widget__field"><label class="field-label">Dropoff</label><input type="text" id="dropoff-oneway" placeholder="Enter Destination" required class="st-input address-input"></div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field"><label class="field-label">Date</label><input type="date" required class="st-input"></div>
                        <div class="booking-widget__field"><label class="field-label">Time</label><input type="time" required class="st-input"></div>
                    </div>
                    <div class="booking-widget__field"><div class="people-addon-trigger st-input" onclick="openAddonModal()"><span id="people-summary-oneway">Select number of people</span></div></div>
                    <div class="price-preview" id="preview-oneway" style="display:none; padding:10px; background:rgba(255,255,255,0.1); border-radius:8px;"><span id="dist-val-oneway" class="clear-price">0 mi</span></div>
                    <button type="submit" class="booking-widget__submit">Get a Quote</button>
                </form>

                <form class="booking-widget__form" id="form-roundtrip">
                    <div class="leg-label">Departing Trip</div>
                    <div class="booking-widget__field"><input type="text" id="pickup-roundtrip" placeholder="Pickup Location" required class="st-input address-input"></div>
                    <div class="booking-widget__field"><input type="text" id="dropoff-roundtrip" placeholder="Destination" required class="st-input address-input"></div>
                    <div class="booking-widget__row"><div class="booking-widget__field"><input type="date" required class="st-input"></div><div class="booking-widget__field"><input type="time" required class="st-input"></div></div>
                    <div class="leg-label" style="margin-top:10px;">Return Trip</div>
                    <div class="booking-widget__field"><input type="text" id="return-pickup-roundtrip" placeholder="Return Pickup" required class="st-input address-input"></div>
                    <div class="booking-widget__field"><input type="text" id="return-dropoff-roundtrip" placeholder="Return Destination" required class="st-input address-input"></div>
                    <div class="booking-widget__row"><div class="booking-widget__field"><input type="date" required class="st-input"></div><div class="booking-widget__field"><input type="time" required class="st-input"></div></div>
                    <div class="booking-widget__field"><div class="people-addon-trigger st-input" onclick="openAddonModal()"><span id="people-summary-roundtrip">Select number of people</span></div></div>
                    <div class="price-preview" id="preview-roundtrip" style="display:none; padding:10px; background:rgba(255,255,255,0.1); border-radius:8px;"><span id="dist-val-roundtrip" class="clear-price">0 mi</span></div>
                    <button type="submit" class="booking-widget__submit">Get a Quote</button>
                </form>

                <form class="booking-widget__form" id="form-hourly">
                    <div class="booking-widget__field"><input type="text" id="pickup-hourly" placeholder="Pickup Location" required class="st-input address-input"></div>
                    <div class="booking-widget__row"><div class="booking-widget__field"><input type="date" required class="st-input"></div><div class="booking-widget__field"><input type="time" required class="st-input"></div><div class="booking-widget__field"><select data-field="hours" id="hours-val" class="st-input"><option value="3">3 Hours (Min)</option><option value="4">4 Hours</option><option value="5">5 Hours</option></select></div></div>
                    <div class="booking-widget__field"><div class="people-addon-trigger st-input" onclick="openAddonModal()"><span id="people-summary-hourly">Select number of people</span></div></div>
                    <button type="submit" class="booking-widget__submit">Get a Quote</button>
                </form>
            </div>
        </div>
    </section>

    <div class="addon-overlay" id="addonOverlay" onclick="if(event.target===this)closeAddonModal()">
        <div class="addon-modal">
            <div class="addon-sheet-handle"></div>
            <div class="addon-header"><h3>Passengers & add-ons</h3><button onclick="closeAddonModal()">&times;</button></div>
            <div class="addon-content">
                <div class="addon-row"><div>Passengers</div><div class="addon-counter"><button onclick="updateCounter('passengers', -1)">-</button><span id="count-passengers">1</span><button onclick="updateCounter('passengers', 1)">+</button></div></div>
                <div class="addon-row"><div>Luggage</div><div class="addon-counter"><button onclick="updateCounter('luggage', -1)">-</button><span id="count-luggage">1</span><button onclick="updateCounter('luggage', 1)">+</button></div></div>
                <button class="addon-confirm-btn" onclick="closeAddonModal()">Confirm</button>
            </div>
        </div>
    </div>

    <div class="vs-overlay" id="vsOverlay"><div class="vs-panel"><div class="vs-header"><h2>Select Vehicle</h2><div id="vs-distance-summary"></div></div><div class="vs-list" id="vsList"></div><div class="vs-footer"><button id="vsBackBtn" class="btn--outline">Back</button><button id="vsContinueBtn" class="btn--primary" disabled>Continue</button></div></div></div>
    <div class="payment-overlay" id="paymentOverlay"><div class="payment-modal"><button class="payment-modal__close" id="paymentClose">&times;</button><div class="payment-modal__summary"><h3 id="pay-vehicle"></h3><p id="pay-total" class="clear-price"></p></div><div class="payment-modal__form"><button id="payBtn" class="pm-book-btn">Book Now</button></div></div></div>

    <script src="script.js"></script>
</body>
</html>
