<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM LIMOUSINE | Premium Black Car & Chauffeur Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <header class="header" id="header">
        <div class="header__inner">
            <a href="#hero" class="header__logo">
                <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" alt="SM LIMOUSINE" class="header__logo-img">
            </a>
            <nav class="header__nav" id="mainNav">
                <a href="#fleet" class="header__link">Fleet</a>
                <a href="#services" class="header__link">Services</a>
                <a href="#testimonials" class="header__link">Testimonials</a>
                <a href="#contact" class="header__link">Contact</a>
            </nav>
            <a href="tel:+1877337654661" class="header__phone">877-33SMLIMO1</a>
            <a href="#booking" class="header__cta">Book Now</a>
            <button class="header__burger" id="burgerBtn"><span></span><span></span><span></span></button>
        </div>
    </header>

    <section class="hero" id="hero">
        <div class="hero__bg"><div class="hero__overlay"></div></div>
        <div class="hero__content">
            <h1 class="hero__title">SM LIMOUSINE</h1>
            <p class="hero__tagline">Experience the Pinnacle of Luxury Travel</p>
            <div class="booking-widget" id="bookingWidget">
                <div class="booking-widget__tabs">
                    <button class="booking-widget__tab active" data-tab="oneway">One Way</button>
                    <button class="booking-widget__tab" data-tab="roundtrip">Round Trip</button>
                    <button class="booking-widget__tab" data-tab="hourly">Hourly</button>
                </div>
                <form class="booking-widget__form active" id="form-oneway">
                    <input type="text" placeholder="Pickup address" required data-field="pickup" class="st-input">
                    <input type="text" placeholder="Dropoff address" required data-field="dropoff" class="st-input">
                    <input type="date" required data-field="date" class="st-input">
                    <input type="time" required data-field="time" class="st-input">
                    <button type="submit" class="booking-widget__submit">Get a Quote</button>
                </form>
                <!-- Forms for other tabs would follow similar simplified structure -->
            </div>
        </div>
    </section>

    <!-- Vehicle Selection Overlay -->
    <div class="vs-overlay" id="vsOverlay">
        <div class="vs-panel">
            <div class="vs-header"><h2>Select Vehicle</h2></div>
            <div class="vs-list" id="vsList"></div>
            <div class="vs-footer">
                <button id="vsBackBtn">Back</button>
                <button id="vsContinueBtn" disabled>Continue</button>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="payment-overlay" id="paymentOverlay">
        <div class="payment-modal">
            <button class="payment-modal__close" id="paymentClose">&times;</button>
            <div class="payment-modal__summary">
                <p id="pay-vehicle"></p>
                <p id="pay-total"></p>
            </div>
            <div class="payment-modal__form">
                <div class="pm-field"><label>Card number</label><div id="card-number-element" class="stripe-el"></div></div>
                <div class="pm-row">
                    <div class="pm-field"><label>Exp. date</label><div id="card-expiry-element" class="stripe-el"></div></div>
                    <div class="pm-field"><label>CVV</label><div id="card-cvc-element" class="stripe-el"></div></div>
                </div>
                <button id="payBtn" class="pm-book-btn">Book</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
