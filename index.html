<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM LIMOUSINE | Premium Black Car & Chauffeur Service</title>
    <meta name="description" content="SM LIMOUSINE — Premium black car and chauffeur service. Escalade, Suburban, Sprinter & Motor Coach. Airport transfers, corporate travel, special events.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://js.stripe.com/v3/"></script>
    <!-- Google Maps API with Error Suppression -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBJjQX0AwWeSZ7FHHwKBGueEwC6VYd9v60&libraries=places"></script>
    <script>
        // Prevents the "Oops! Something went wrong" box from appearing in UI
        window.gm_authFailure = function() {
            console.warn("Google Maps authentication failed. Switching to manual input mode.");
            const errorBoxes = document.querySelectorAll('.gm-err-container');
            errorBoxes.forEach(box => box.style.display = 'none');
        };
    </script>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="header" id="header">
        <div class="header__inner">
            <a href="#hero" class="header__logo-centered">
                <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" alt="SM LIMOUSINE" class="header__logo-img-large">
            </a>
            <nav class="header__nav" id="mainNav">
                <a href="#fleet" class="header__link">Fleet</a>
                <a href="#services" class="header__link">Services</a>
                <a href="#contact" class="header__link">Contact</a>
            </nav>
            <div class="header__actions">
                <a href="tel:+18177234592" class="header__phone">817-723-4592</a>
                <button class="header__burger" id="burgerBtn">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <!-- ===== HERO SECTION ===== -->
    <section class="hero" id="hero">
        <div class="hero__bg">
            <div class="hero__overlay"></div>
        </div>
        <div class="hero__content">
            <div class="hero__logo-wrap">
                <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" alt="SM LIMOUSINE" class="hero__logo-img">
            </div>
            <h2 class="hero__tagline">Experience the Pinnacle of Luxury Travel</h2>
            <p class="hero__subtitle">Elite chauffeur service for your every journey</p>

            <!-- Booking Widget -->
            <div class="booking-widget" id="bookingWidget">
                <div class="booking-widget__tabs">
                    <button class="booking-widget__tab active" data-tab="oneway">One Way</button>
                    <button class="booking-widget__tab" data-tab="roundtrip">Round Trip</button>
                    <button class="booking-widget__tab" data-tab="hourly">Hourly</button>
                </div>

                <!-- One Way Form -->
                <form class="booking-widget__form active" id="form-oneway">
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Pickup Address</label>
                            <input type="text" id="pickup-oneway" placeholder="Enter Pickup Location" required data-field="pickup" class="st-input address-input">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Dropoff Address</label>
                            <input type="text" id="dropoff-oneway" placeholder="Enter Destination" required data-field="dropoff" class="st-input address-input">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Date</label>
                            <input type="date" required data-field="date" class="st-input">
                        </div>
                        <div class="booking-widget__field">
                            <label class="field-label">Time</label>
                            <input type="time" required data-field="time" class="st-input">
                        </div>
                    </div>
                    <div class="price-preview" id="preview-oneway" style="display:none; padding: 10px; background: rgba(192,192,192,0.1); border-radius: 8px; margin-bottom: 12px; text-align: center;">
                        <span style="color: #C0C0C0; font-size: 0.8rem;">Estimated Distance: </span>
                        <span id="dist-val-oneway" class="clear-price">0 mi</span>
                    </div>
                    <button type="submit" class="booking-widget__submit">Get a Quote</button>
                </form>

                <!-- Round Trip Form -->
                <form class="booking-widget__form" id="form-roundtrip">
                    <div style="text-align: left; margin-bottom: 8px; color: #C0C0C0; font-size: 0.7rem; font-weight: bold; text-transform: uppercase;">Departing Trip</div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Pickup Address</label>
                            <input type="text" id="pickup-roundtrip" placeholder="Enter Pickup Location" required data-field="pickup" class="st-input address-input">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Dropoff Address</label>
                            <input type="text" id="dropoff-roundtrip" placeholder="Enter Destination" required data-field="dropoff" class="st-input address-input">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Date</label>
                            <input type="date" required class="st-input">
                        </div>
                        <div class="booking-widget__field">
                            <label class="field-label">Time</label>
                            <input type="time" required class="st-input">
                        </div>
                    </div>

                    <div style="text-align: left; margin-top: 15px; margin-bottom: 8px; color: #C0C0C0; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">Return Trip</div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Return Pickup</label>
                            <input type="text" id="return-pickup-roundtrip" placeholder="Enter Return Pickup Location" required class="st-input address-input">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Return Dropoff</label>
                            <input type="text" id="return-dropoff-roundtrip" placeholder="Enter Return Destination" required class="st-input address-input">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Return Date</label>
                            <input type="date" required class="st-input">
                        </div>
                        <div class="booking-widget__field">
                            <label class="field-label">Return Time</label>
                            <input type="time" required class="st-input">
                        </div>
                    </div>

                    <div class="price-preview" id="preview-roundtrip" style="display:none; padding: 10px; background: rgba(192,192,192,0.1); border-radius: 8px; margin-top: 12px; margin-bottom: 12px; text-align: center;">
                        <span id="dist-val-roundtrip" class="clear-price">0 mi</span>
                    </div>
                    <button type="submit" class="booking-widget__submit">Get a Quote</button>
                </form>

                <!-- Hourly Form -->
                <form class="booking-widget__form" id="form-hourly">
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Pickup Address</label>
                            <input type="text" id="pickup-hourly" placeholder="Enter Pickup Location" required data-field="pickup" class="st-input address-input">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label class="field-label">Date</label>
                            <input type="date" required data-field="date" class="st-input">
                        </div>
                        <div class="booking-widget__field">
                            <label class="field-label">Time</label>
                            <input type="time" required data-field="time" class="st-input">
                        </div>
                        <div class="booking-widget__field">
                            <label class="field-label">Hours</label>
                            <select data-field="hours" id="hours-val" class="st-input">
                                <option value="3">3 Hours (Min)</option>
                                <option value="4">4 Hours</option>
                                <option value="5">5 Hours</option>
                                <option value="6">6 Hours</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="booking-widget__submit">Get a Quote</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Vehicle Selection Overlay -->
    <div class="vs-overlay" id="vsOverlay">
        <div class="vs-panel">
            <div class="vs-header">
                <h2 style="color:white">Select Your Vehicle</h2>
                <div id="vs-distance-summary" style="color:#C0C0C0; font-size: 0.8rem; margin-top: 5px;"></div>
            </div>
            <div class="vs-list" id="vsList"></div>
            <div class="vs-footer">
                <button id="vsBackBtn" class="btn--outline">Back</button>
                <button id="vsContinueBtn" class="btn--primary" disabled>Continue</button>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="payment-overlay" id="paymentOverlay">
        <div class="payment-modal">
            <button class="payment-modal__close" id="paymentClose">&times;</button>
            <div class="payment-modal__summary">
                <h3 id="pay-vehicle" style="color:white; margin-bottom:10px"></h3>
                <p id="pay-total" class="clear-price"></p>
                <div id="discount-display" style="display:none; color:#2ecc71; font-size:0.85rem; margin-top:5px;">Discount Applied!</div>
            </div>
            <div class="payment-modal__form">
                <div class="pm-field">
                    <label style="color:#C0C0C0; font-size:0.75rem; display:block; margin-bottom:5px; text-transform:uppercase;">Discount Code</label>
                    <div style="display:flex; gap:8px; margin-bottom:15px;">
                        <input type="text" id="discount-input" placeholder="Enter code" style="flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px; color:white; outline:none;">
                        <button id="apply-discount-btn" style="background:rgba(192,192,192,0.2); border:1px solid rgba(192,192,192,0.3); color:white; padding:0 15px; border-radius:8px; cursor:pointer; font-weight:600; font-size:0.8rem;">Apply</button>
                    </div>
                </div>
                <div class="pm-field"><label style="color:#C0C0C0; font-size:0.8rem; display:block; margin-bottom:5px">Card Number</label><div id="card-number-element" class="stripe-box"></div></div>
                <div class="pm-row" style="display:flex; gap:10px; margin-top:15px;">
                    <div class="pm-field" style="flex:1"><label style="color:#C0C0C0; font-size:0.8rem; display:block; margin-bottom:5px">Expiry</label><div id="card-expiry-element" class="stripe-box"></div></div>
                    <div class="pm-field" style="flex:1"><label style="color:#C0C0C0; font-size:0.8rem; display:block; margin-bottom:5px">CVV</label><div id="card-cvc-element" class="stripe-box"></div></div>
                </div>
                <button id="payBtn" class="pm-book-btn">Book Now</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
