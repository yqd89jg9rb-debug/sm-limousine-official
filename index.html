<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM LIMOUSINE | Premium Black Car & Chauffeur Service</title>
    <meta name="description" content="SM LIMOUSINE — Premium black car and chauffeur service. Escalade, Suburban, Sprinter & Motor Coach. Airport transfers, corporate travel, special events.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Load Stripe with immediate priority -->
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <header class="header" id="header">
        <div class="header__inner">
            <a href="#hero" class="header__logo">
                <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" alt="SM LIMOUSINE" class="header__logo-img">
            </a>
            <nav class="header__nav" id="mainNav">
                <a href="#fleet" class="header__link">Fleet</a>
                <a href="#services" class="header__link">Services</a>
                <a href="#testimonials" class="header__link">Testimonials</a>
                <a href="#contact" class="header__link">Contact</a>
            </nav>
            <a href="tel:+1877337654661" class="header__phone">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                877-33SMLIMO1
            </a>
            <a href="#booking" class="header__cta">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
                Book Now
            </a>
            <button class="header__burger" id="burgerBtn" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- ===== HERO SECTION ===== -->
    <section class="hero" id="hero">
        <div class="hero__bg">
            <div class="hero__overlay"></div>
        </div>
        <div class="hero__content">
            <h1 class="hero__title">SM LIMOUSINE</h1>
            <p class="hero__tagline">Experience the Pinnacle of Luxury Travel</p>
            <p class="hero__subtitle">Elite chauffeur service for your every journey</p>

            <!-- Booking Widget -->
            <div class="booking-widget" id="bookingWidget">
                <div class="booking-widget__tabs">
                    <button class="booking-widget__tab active" data-tab="oneway">One Way</button>
                    <button class="booking-widget__tab" data-tab="roundtrip">Round Trip</button>
                    <button class="booking-widget__tab" data-tab="hourly">Hourly</button>
                </div>

                <!-- One Way Form -->
                <form class="booking-widget__form active" id="form-oneway">
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 10-16 0c0 3 2.7 7 8 11.7z"/></svg>
                                Pickup Location
                            </label>
                            <input type="text" placeholder="Enter pickup address" required data-field="pickup">
                        </div>
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                Dropoff Location
                            </label>
                            <input type="text" placeholder="Enter dropoff address" required data-field="dropoff">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                Date
                            </label>
                            <input type="date" required data-field="date">
                        </div>
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                Time
                            </label>
                            <input type="time" required data-field="time">
                        </div>
                        <div class="booking-widget__field booking-widget__field--small">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                Passengers
                            </label>
                            <select data-field="passengers">
                                <option>1</option><option>2</option><option>3</option><option>4</option>
                                <option>5</option><option>6</option><option>7</option><option>8+</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="booking-widget__submit">Get a Quote</button>
                </form>

                <!-- Round Trip Form -->
                <form class="booking-widget__form" id="form-roundtrip">
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 10-16 0c0 3 2.7 7 8 11.7z"/></svg>
                                Pickup Location
                            </label>
                            <input type="text" placeholder="Enter pickup address" required data-field="pickup">
                        </div>
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                Dropoff Location
                            </label>
                            <input type="text" placeholder="Enter dropoff address" required data-field="dropoff">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                Pickup Date
                            </label>
                            <input type="date" required data-field="date">
                        </div>
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                Pickup Time
                            </label>
                            <input type="time" required data-field="time">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                Return Date
                            </label>
                            <input type="date" required data-field="returnDate">
                        </div>
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                Return Time
                            </label>
                            <input type="time" required data-field="returnTime">
                        </div>
                        <div class="booking-widget__field booking-widget__field--small">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                Passengers
                            </label>
                            <select data-field="passengers">
                                <option>1</option><option>2</option><option>3</option><option>4</option>
                                <option>5</option><option>6</option><option>7</option><option>8+</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="booking-widget__submit">Get a Quote</button>
                </form>

                <!-- Hourly Form -->
                <form class="booking-widget__form" id="form-hourly">
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 10-16 0c0 3 2.7 7 8 11.7z"/></svg>
                                Pickup Location
                            </label>
                            <input type="text" placeholder="Enter pickup address" required data-field="pickup">
                        </div>
                    </div>
                    <div class="booking-widget__row">
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                Date
                            </label>
                            <input type="date" required data-field="date">
                        </div>
                        <div class="booking-widget__field">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                Time
                            </label>
                            <input type="time" required data-field="time">
                        </div>
                        <div class="booking-widget__field booking-widget__field--small">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                Hours
                            </label>
                            <select data-field="hours">
                                <option value="3">3 (min)</option><option value="4">4</option><option value="5">5</option><option value="6">6</option>
                                <option value="7">7</option><option value="8">8</option><option value="10">10</option><option value="12">12</option>
                            </select>
                        </div>
                        <div class="booking-widget__field booking-widget__field--small">
                            <label>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                Passengers
                            </label>
                            <select data-field="passengers">
                                <option>1</option><option>2</option><option>3</option><option>4</option>
                                <option>5</option><option>6</option><option>7</option><option>8+</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="booking-widget__submit">Get a Quote</button>
                </form>
            </div>

            <div class="hero__trust">
                <span>Trusted by professionals for executive travel</span>
            </div>
            <div class="hero__cta-row">
                <a href="#fleet" class="btn btn--outline-hero">Explore Our Fleet</a>
            </div>
        </div>
    </section>

    <!-- Vehicle Selection Overlay -->
    <div class="vs-overlay" id="vsOverlay">
        <div class="vs-panel">
            <div class="vs-header">
                <h2 style="color:white">Select Vehicle</h2>
            </div>
            <div class="vs-list" id="vsList"></div>
            <div class="vs-footer">
                <button id="vsBackBtn" class="btn btn--outline">Back</button>
                <button id="vsContinueBtn" class="btn btn--primary" disabled>Continue</button>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="payment-overlay" id="paymentOverlay">
        <div class="payment-modal">
            <button class="payment-modal__close" id="paymentClose">&times;</button>
            <div class="payment-modal__summary">
                <h3 style="color:white; margin-bottom: 10px;">Booking Summary</h3>
                <p id="pay-vehicle" style="color:#C0C0C0"></p>
                <p id="pay-total" style="color:white; font-weight:bold; font-size: 1.2rem"></p>
            </div>
            <div class="payment-modal__form">
                <div class="pm-field"><label style="color:#C0C0C0; font-size: 0.8rem">Card number</label><div id="card-number-element" style="background:rgba(255,255,255,0.05); padding:12px; border-radius:8px; border: 1px solid rgba(192,192,192,0.2)"></div></div>
                <div class="pm-row" style="display:flex; gap:10px; margin-top:15px;">
                    <div class="pm-field" style="flex:1"><label style="color:#C0C0C0; font-size: 0.8rem">Exp. date</label><div id="card-expiry-element" style="background:rgba(255,255,255,0.05); padding:12px; border-radius:8px; border: 1px solid rgba(192,192,192,0.2)"></div></div>
                    <div class="pm-field" style="flex:1"><label style="color:#C0C0C0; font-size: 0.8rem">CVV</label><div id="card-cvc-element" style="background:rgba(255,255,255,0.05); padding:12px; border-radius:8px; border: 1px solid rgba(192,192,192,0.2)"></div></div>
                </div>
                <button id="payBtn" class="btn btn--primary" style="width:100%; margin-top:20px">Book</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
