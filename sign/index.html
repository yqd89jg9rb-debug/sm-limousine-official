<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greeting Sign | SM LIMOUSINE</title>
    
    <!-- Full Screen Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        .logo-container {
            margin-top: 5vh; /* Pushed slightly higher */
            width: 100%;
            display: flex;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .logo-img {
            height: 70px; /* Reduced from 90px to 70px as requested */
            width: auto;
            border-radius: 6px;
        }

        .name-container {
            width: 95%;
            text-align: center;
            margin-top: 10vh;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .client-name {
            font-size: 14vw;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            background: transparent;
            color: #ffffff;
            text-align: center;
            width: 100%;
            outline: none;
            line-height: 1.1;
            padding-bottom: 20px;
            white-space: nowrap;
            overflow: hidden;
        }

        .instruction {
            position: absolute;
            bottom: 30px;
            font-size: 11px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: opacity 0.3s ease;
        }

        /* Hiding UI elements while typing */
        body.is-typing .logo-container,
        body.is-typing .instruction {
            opacity: 0;
            pointer-events: none;
        }

        body.is-typing .name-container {
            margin-top: 0;
        }
    </style>
</head>
<body>

    <div class="logo-container" id="logoWrap">
        <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" 
             alt="SM LIMOUSINE" 
             class="logo-img">
    </div>

    <div class="name-container">
        <div class="client-name" 
             id="nameField"
             contenteditable="true" 
             spellcheck="false">TAP TO TYPE NAME</div>
    </div>

    <div class="instruction">SM LIMOUSINE GREETING SIGN</div>

    <script>
        const el = document.getElementById('nameField');
        const body = document.body;

        // Function to attempt fullscreen
        function enterFullscreen() {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen();
            } else if (docEl.webkitRequestFullscreen) {
                docEl.webkitRequestFullscreen(); // Safari logic
            } else if (docEl.msRequestFullscreen) {
                docEl.msRequestFullscreen();
            }
        }
        
        el.addEventListener('focus', function() {
            body.classList.add('is-typing');
            
            // Try to hide the browser bars by entering fullscreen
            enterFullscreen();

            if (this.innerText === 'TAP TO TYPE NAME') {
                this.innerText = '';
            }
        });

        el.addEventListener('blur', function() {
            body.classList.remove('is-typing');
            if (this.innerText.trim() === '') {
                this.innerText = 'TAP TO TYPE NAME';
            }
        });

        el.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                this.blur();
            }
        });

        // Support for tap-to-fullscreen anywhere else
        document.addEventListener('click', function(e) {
            if (e.target !== el) enterFullscreen();
        });
    </script>
</body>
</html>
