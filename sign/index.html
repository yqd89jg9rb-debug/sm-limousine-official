<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Greeting Sign | SM LIMOUSINE</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg">

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            overflow: hidden;
            touch-action: none; 
        }

        .logo-container {
            margin-top: 5dvh;
            width: 100%;
            display: flex; justify-content: center;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .logo-img {
            height: 150px; /* Reduced by 25% from 200px */
            width: auto;
            border-radius: 10px;
        }

        .name-container {
            width: 100%;
            text-align: center;
            flex-grow: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 0 20px;
        }

        .client-name {
            font-size: 15vw; 
            font-weight: 900;
            text-transform: uppercase;
            border: none; background: transparent;
            color: #ffffff; text-align: center;
            width: 100%; outline: none;
            line-height: 1.0; white-space: nowrap;
            overflow: visible;
        }

        .instruction {
            position: absolute; bottom: 15px;
            font-size: 10px; color: #333;
            text-transform: uppercase; letter-spacing: 1px;
            text-align: center; width: 100%;
        }

        body.is-typing .logo-container, 
        body.is-typing .instruction {
            display: none !important;
        }

        /* Hidden video for keep-awake fallback */
        #keepAwakeVideo {
            position: absolute; width: 1px; height: 1px;
            opacity: 0; pointer-events: none;
        }

        @media (orientation: landscape) {
            .logo-img { height: 75px; } /* Reduced from 100px */
        }
    </style>
</head>
<body>

    <!-- Hidden video element to trick mobile browsers into staying awake -->
    <video id="keepAwakeVideo" loop muted playsinline src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/assets/blank_loop.mp4"></video>

    <div class="logo-container">
        <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" 
             alt="SM LIMOUSINE" class="logo-img">
    </div>

    <div class="name-container" id="zoomArea">
        <div class="client-name" id="nameField" contenteditable="true" spellcheck="false">TAP NAME</div>
    </div>

    <div class="instruction">Pinch to resize • Screen locked ON</div>

    <script>
        const el = document.getElementById('nameField');
        const zoomArea = document.getElementById('zoomArea');
        const body = document.body;
        const video = document.getElementById('keepAwakeVideo');
        
        let currentFontSize = 15;
        let wakeLock = null;

        // --- HEAVY DUTY WAKE LOCK ---
        const startKeepAwake = async () => {
            // 1. Try modern Wake Lock API
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log("Wake Lock Active");
                }
            } catch (err) {}

            // 2. Play hidden silent video (Fallback for older iOS/Android)
            try {
                video.play();
            } catch (err) {}
        };

        // Re-engage on visibility change
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') startKeepAwake();
        });

        // Engage on ANY interaction
        ['click', 'touchstart', 'focus'].forEach(evt => {
            document.addEventListener(evt, startKeepAwake, { once: false });
        });

        // --- PINCH TO ZOOM ---
        let initialDist = 0;
        zoomArea.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                initialDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            }
        });

        zoomArea.addEventListener('touchmove', e => {
            if (e.touches.length === 2) {
                const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                const diff = currentDist - initialDist;
                if (Math.abs(diff) > 5) {
                    currentFontSize = Math.min(Math.max(5, currentFontSize * (diff > 0 ? 1.05 : 0.95)), 45);
                    el.style.fontSize = currentFontSize + 'vw';
                    initialDist = currentDist;
                }
            }
        });

        el.addEventListener('focus', function() {
            body.classList.add('is-typing');
            if (this.innerText === 'TAP NAME') this.innerText = '';
        });

        el.addEventListener('blur', function() {
            body.classList.remove('is-typing');
            if (this.innerText.trim() === '') this.innerText = 'TAP NAME';
        });

        el.addEventListener('keydown', e => {
            if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        });
    </script>
</body>
</html>
