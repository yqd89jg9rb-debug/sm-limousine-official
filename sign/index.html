<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greeting Sign | SM LIMOUSINE</title>
    
    <!-- Mobile Full Screen Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        .logo-container {
            margin-top: 8vh;
            width: 100%;
            display: flex;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }

        .logo-img {
            height: 90px; /* Reduced from 140px */
            width: auto;
            border-radius: 8px;
        }

        .name-container {
            width: 95%;
            text-align: center;
            margin-top: 12vh;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: margin-top 0.4s ease;
        }

        .client-name {
            font-size: 14vw;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            background: transparent;
            color: #ffffff;
            text-align: center;
            width: 100%;
            outline: none;
            line-height: 1.1;
            padding-bottom: 20px;
            white-space: nowrap;
            overflow: hidden;
        }

        .instruction {
            position: absolute;
            bottom: 30px;
            font-size: 11px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: opacity 0.3s ease;
        }

        /* Hiding state when typing */
        body.is-typing .logo-container {
            opacity: 0;
            margin-top: -50px;
            pointer-events: none;
        }

        body.is-typing .instruction {
            opacity: 0;
        }

        body.is-typing .name-container {
            margin-top: 0; /* Center the name better when typing */
        }

        @media print {
            .instruction { display: none; }
        }
    </style>
</head>
<body>

    <div class="logo-container" id="logoWrap">
        <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" 
             alt="SM LIMOUSINE" 
             class="logo-img">
    </div>

    <div class="name-container">
        <div class="client-name" 
             id="nameField"
             contenteditable="true" 
             spellcheck="false">TAP TO TYPE NAME</div>
    </div>

    <div class="instruction">SM LIMOUSINE GREETING SIGN</div>

    <script>
        const el = document.getElementById('nameField');
        const body = document.body;
        
        el.addEventListener('focus', function() {
            body.classList.add('is-typing');
            if (this.innerText === 'TAP TO TYPE NAME') {
                this.innerText = '';
            }
        });

        el.addEventListener('blur', function() {
            body.classList.remove('is-typing');
            if (this.innerText.trim() === '') {
                this.innerText = 'TAP TO TYPE NAME';
            }
        });

        el.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                this.blur();
            }
        });
    </script>
</body>
</html>
