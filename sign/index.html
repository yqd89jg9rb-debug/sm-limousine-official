<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Greeting Sign | SM LIMOUSINE</title>
    
    <!-- Standard PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; /* Dynamic Viewport Height for mobile */
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        .logo-container {
            margin-top: 5dvh;
            width: 100%;
            display: flex;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .logo-img {
            height: 60px;
            width: auto;
            border-radius: 6px;
        }

        .name-container {
            width: 95%;
            text-align: center;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .client-name {
            font-size: 16vw; /* Massive size */
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            background: transparent;
            color: #ffffff;
            text-align: center;
            width: 100%;
            outline: none;
            line-height: 1.0;
            white-space: nowrap;
            overflow: hidden;
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: opacity 0.3s ease;
        }

        /* Hidden states for typing */
        body.is-typing .logo-container,
        body.is-typing .instruction {
            opacity: 0;
            visibility: hidden;
        }

        @media (orientation: landscape) {
            .logo-img { height: 40px; }
            .client-name { font-size: 18vh; }
        }
    </style>
</head>
<body>

    <div class="logo-container" id="logoWrap">
        <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" 
             alt="SM LIMOUSINE" 
             class="logo-img">
    </div>

    <div class="name-container">
        <div class="client-name" 
             id="nameField"
             contenteditable="true" 
             spellcheck="false">TAP NAME</div>
    </div>

    <div class="instruction">Full Screen: Share > Add to Home Screen</div>

    <script>
        const el = document.getElementById('nameField');
        const body = document.body;
        
        el.addEventListener('focus', function() {
            body.classList.add('is-typing');
            if (this.innerText === 'TAP NAME') {
                this.innerText = '';
            }
        });

        el.addEventListener('blur', function() {
            body.classList.remove('is-typing');
            if (this.innerText.trim() === '') {
                this.innerText = 'TAP NAME';
            }
        });

        el.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                this.blur();
            }
        });
    </script>
</body>
</html>
