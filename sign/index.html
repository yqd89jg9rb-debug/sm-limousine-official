<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Greeting Sign | SM LIMOUSINE</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        .logo-container {
            margin-top: 10vh;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            height: 140px;
            width: auto;
            border-radius: 8px;
        }

        .name-container {
            width: 90%;
            text-align: center;
            margin-top: 12vh;
            min-height: 20vh; /* Ensure the area is always tappable */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .client-name {
            font-size: 14vw; /* Even bigger for visibility */
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            background: transparent;
            color: #ffffff;
            text-align: center;
            width: 100%;
            outline: none;
            word-wrap: break-word;
            line-height: 1.1;
            border-bottom: 2px solid rgba(255,255,255,0.1); /* Subtle hint line */
            padding-bottom: 10px;
        }

        .client-name:empty:before {
            content: attr(data-placeholder);
            color: #333;
        }

        .instruction {
            position: absolute;
            bottom: 30px;
            font-size: 12px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @media print {
            .instruction { display: none; }
            .client-name { border-bottom: none; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" 
             alt="SM LIMOUSINE" 
             class="logo-img">
    </div>

    <div class="name-container">
        <div class="client-name" 
             id="nameField"
             contenteditable="true" 
             spellcheck="false" 
             data-placeholder="TAP TO TYPE NAME">TAP TO TYPE NAME</div>
    </div>

    <div class="instruction">SM LIMOUSINE GREETING SIGN</div>

    <script>
        const el = document.getElementById('nameField');
        
        // Clear placeholder text only when user first clicks
        el.addEventListener('focus', function() {
            if (this.innerText === 'TAP TO TYPE NAME') {
                this.innerText = '';
            }
        });

        // If they click away and it's empty, put the placeholder back
        el.addEventListener('blur', function() {
            if (this.innerText.trim() === '') {
                this.innerText = 'TAP TO TYPE NAME';
            }
        });
    </script>
</body>
</html>
