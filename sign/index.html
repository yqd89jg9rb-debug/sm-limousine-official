<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Greeting Sign | SM LIMOUSINE</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Start from top to control spacing */
            overflow: hidden;
        }

        .logo-container {
            margin-top: 8vh; /* Control logo height from top */
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            height: 140px; /* Made logo slightly larger too */
            width: auto;
            border-radius: 8px;
        }

        .name-container {
            width: 95%;
            text-align: center;
            margin-top: 15vh; /* Pushes the name further down from the logo */
        }

        .client-name {
            font-size: 12vw; /* Increased from 8vw to 12vw for a bigger look */
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            background: transparent;
            color: #ffffff;
            text-align: center;
            width: 100%;
            outline: none;
            word-wrap: break-word;
            line-height: 1.1;
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media print {
            .instruction { display: none; }
            .logo-container { margin-top: 2cm; }
            .name-container { margin-top: 4cm; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" 
             alt="SM LIMOUSINE" 
             class="logo-img">
    </div>

    <div class="name-container">
        <div class="client-name" contenteditable="true" spellcheck="false">TAP TO TYPE NAME</div>
    </div>

    <div class="instruction">Digital Greeting Sign — SM LIMOUSINE</div>

    <script>
        // Clear default text on focus
        const nameField = document.querySelector('.client-name');
        nameField.addEventListener('focus', function() {
            if (this.innerText === 'TAP TO TYPE NAME') {
                this.innerText = '';
            }
        });

        // Optional: Keep focus for better tablet experience
        window.onload = () => {
            // Add a small delay to ensure rendering
            setTimeout(() => nameField.focus(), 500);
        };
    </script>
</body>
</html>
