<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <title>Greeting Sign | SM LIMOUSINE</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
            touch-action: none; /* Required for custom pinch gestures */
        }

        .logo-container {
            margin-top: 5dvh;
            width: 100%;
            display: flex;
            justify-content: center;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .logo-img {
            height: 160px; /* Increased from 110px */
            width: auto;
            border-radius: 10px;
        }

        .name-container {
            width: 100%;
            text-align: center;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        .client-name {
            font-size: 14vw; /* Starting size, now adjustable */
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            background: transparent;
            color: #ffffff;
            text-align: center;
            width: 100%;
            outline: none;
            line-height: 1.0;
            white-space: nowrap;
            overflow: visible;
        }

        .instruction {
            position: absolute;
            bottom: 15px;
            font-size: 10px;
            color: #222;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
        }

        body.is-typing .logo-container, 
        body.is-typing .instruction {
            display: none !important;
        }

        @media (orientation: landscape) {
            .logo-img { height: 100px; }
        }
    </style>
</head>
<body>

    <div class="logo-container" id="logoWrap">
        <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" 
             alt="SM LIMOUSINE" 
             class="logo-img">
    </div>

    <div class="name-container" id="zoomArea">
        <div class="client-name" 
             id="nameField"
             contenteditable="true" 
             spellcheck="false">TAP NAME</div>
    </div>

    <div class="instruction">Pinch with two fingers to resize name</div>

    <script>
        const el = document.getElementById('nameField');
        const zoomArea = document.getElementById('zoomArea');
        const body = document.body;
        
        let currentFontSize = 14; // in vw
        
        // --- WAKE LOCK ---
        let wakeLock = null;
        const requestWakeLock = async () => {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        };
        document.addEventListener('click', requestWakeLock, { once: true });

        // --- PINCH TO ZOOM LOGIC ---
        let initialDist = 0;
        
        zoomArea.addEventListener('touchstart', e => {
            if (e.touches.length === 2) {
                initialDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
            }
        }, {passive: false});

        zoomArea.addEventListener('touchmove', e => {
            if (e.touches.length === 2) {
                const currentDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                
                const diff = currentDist - initialDist;
                if (Math.abs(diff) > 5) {
                    const scaleFactor = diff > 0 ? 1.05 : 0.95;
                    currentFontSize = Math.min(Math.max(5, currentFontSize * scaleFactor), 40);
                    el.style.fontSize = currentFontSize + 'vw';
                    initialDist = currentDist;
                }
            }
        }, {passive: false});

        el.addEventListener('focus', function() {
            body.classList.add('is-typing');
            if (this.innerText === 'TAP NAME') this.innerText = '';
        });

        el.addEventListener('blur', function() {
            body.classList.remove('is-typing');
            if (this.innerText.trim() === '') this.innerText = 'TAP NAME';
        });

        el.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                e.preventDefault();
                el.blur();
            }
        });
    </script>
</body>
</html>
