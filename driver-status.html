<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SM LIMOUSINE | Driver Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --black-light: #0a0a0a;
            --black-card: #111111;
            --gold: #D4AF37;
            --gold-light: #F9E2AF;
            --gold-dark: #A67C00;
            --white: #ffffff;
            --accent-glow: rgba(212, 175, 55, 0.25);
            --font-sans: 'Inter', sans-serif;
            --radius: 12px;
            --transition: 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background-color: var(--black);
            color: var(--gold);
            padding: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .ds-header { width: 100%; padding: 15px 20px; text-align: center; border-bottom: 1px solid rgba(212, 175, 55, 0.15); background: var(--black-light); }
        .ds-header img { height: 110px; width: auto; filter: brightness(1.2); }

        .ds-container { width: 100%; max-width: 480px; padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; }

        .card { background: var(--black-card); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card::before { content: ''; position: absolute; left: 0; top: 20px; bottom: 20px; width: 4px; background: var(--gold); border-radius: 0 4px 4px 0; }

        .card__header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); padding-bottom: 15px; }
        .card__title { font-size: 1.1rem; font-weight: 700; color: var(--white); }

        .info-grid { display: flex; flex-direction: column; gap: 12px; }
        .info-row { display: flex; justify-content: space-between; font-size: 0.9rem; align-items: flex-start; }
        .info-label { font-weight: 700; color: var(--gold-dark); flex-shrink: 0; width: 100px; }
        .info-value { color: var(--gold-light); text-align: right; word-break: break-word; }

        .nav-link { color: #5dade2; text-decoration: underline; font-weight: 600; cursor: pointer; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .status-btn { background: var(--black-card); border: 1px solid rgba(192, 192, 192, 0.1); border-radius: 10px; padding: 16px 12px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all var(--transition); font-size: 0.9rem; font-weight: 700; color: var(--gold); }
        .status-btn.active { background: rgba(212, 175, 55, 0.2); border-color: var(--gold); color: var(--white); }

        .call-dispatch { background: linear-gradient(135deg, #443300 0%, #000000 100%); color: var(--white); border: 1px solid rgba(212, 175, 55, 0.3); width: 100%; padding: 18px; border-radius: 10px; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; margin-top: 10px; text-decoration: none; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--gold); color: var(--black); padding: 12px 30px; border-radius: 50px; font-size: 0.9rem; font-weight: 700; z-index: 1000; opacity: 0; transition: all 0.4s; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <header class="ds-header">
        <img src="https://static.prod-images.emergentagent.com/jobs/f17b6fee-cc29-44c6-94cf-45fa9654051a/images/b589ae7bf307bf16f3410b6cb1ee8cb91f6cbf51ef443f48053b33604b76aa30.jpeg" alt="SM LIMOUSINE">
    </header>

    <main class="ds-container">
        <div class="card">
            <div class="card__header"><span class="card__title">Reservation info</span></div>
            <div class="info-grid">
                <div class="info-row"><span class="info-label">Booking ID:</span><span class="info-value" id="bookingId">0</span></div>
                <div class="info-row"><span class="info-label">Passenger:</span><span class="info-value" id="passenger">--</span></div>
                <div class="info-row"><span class="info-label">Vehicle:</span><span class="info-value" id="vehicle">--</span></div>
                <div class="info-row"><span class="info-label">Pickup:</span><span class="info-value"><a id="pickupLink" class="nav-link" target="_blank">Tap to Navigate</a></span></div>
                <div class="info-row"><span class="info-label">Dropoff:</span><span class="info-value"><a id="dropoffLink" class="nav-link" target="_blank">Tap to Navigate</a></span></div>
            </div>
        </div>

        <div class="status-grid">
            <button class="status-btn" onclick="sendSMS(this, 'Enroute')">Enroute</button>
            <button class="status-btn" onclick="sendSMS(this, 'On-Site')">On-Site</button>
            <button class="status-btn" onclick="sendSMS(this, 'On-Board')">On-Board</button>
            <button class="status-btn" onclick="sendSMS(this, 'Complete')">Complete</button>
            <button class="status-btn" onclick="sendSMS(this, 'Circling')">Circling</button>
            <button class="status-btn" onclick="sendSMS(this, 'No Show')">No Show</button>
        </div>

        <a href="tel:+18177234592" class="call-dispatch">Call Dispatch</a>
    </main>

    <div id="toast" class="toast">Opening SMS...</div>

    <script>
        function sendSMS(btn, status) {
            const bookingId = document.getElementById('bookingId').textContent;
            const passenger = document.getElementById('passenger').textContent;
            const phone = "+18177234592";
            
            document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const message = "SM LIMO: " + status + " | ID: " + bookingId + " | Client: " + passenger;
            const isiPhone = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            const url = "sms:" + phone + (isiPhone ? "&" : "?") + "body=" + encodeURIComponent(message);
            
            showToast('Opening text message...');
            setTimeout(() => { window.location.href = url; }, 500);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        const p = new URLSearchParams(window.location.search);
        const bookingId = p.get('id') || '0';
        const passenger = p.get('passenger') || '--';
        const pickup = p.get('pickup') || '';
        const drop = p.get('drop') || '';

        document.getElementById('bookingId').textContent = bookingId;
        document.getElementById('passenger').textContent = passenger;
        if(p.get('vehicle')) document.getElementById('vehicle').textContent = p.get('vehicle');
        
        if(pickup) document.getElementById('pickupLink').href = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(pickup);
        if(drop) document.getElementById('dropoffLink').href = "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(drop);
    </script>
</body>
</html>
